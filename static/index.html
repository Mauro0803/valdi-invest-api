<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Valdi-Invest Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-4 font-sans">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-2">Valdi-Invest: Monitor en Vivo</h1>

        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 mb-6 shadow-xl">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Fecha Compra</label>
                    <input id="fechaIn" type="date" class="w-full bg-slate-700 border-none p-2 rounded text-sm text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Ticker (.SN)</label>
                    <input id="entIn" type="text" placeholder="SQM-B.SN" class="w-full bg-slate-700 border-none p-2 rounded text-sm uppercase">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Acciones</label>
                    <input id="accIn" type="number" placeholder="0" class="w-full bg-slate-700 border-none p-2 rounded text-sm">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Precio Compra</label>
                    <input id="preIn" type="number" step="any" placeholder="0.00" class="w-full bg-slate-700 border-none p-2 rounded text-sm">
                </div>
                <div class="flex items-end">
                    <button onclick="agregar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded text-sm transition">Registrar</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-x-auto shadow-2xl">
            <table class="w-full text-left text-xs">
                <thead class="bg-slate-700 text-slate-400 uppercase">
                    <tr>
                        <th class="p-3">Fecha</th>
                        <th class="p-3">Ticker</th>
                        <th class="p-3 text-right">Cant.</th>
                        <th class="p-3 text-right">P. Compra</th>
                        <th class="p-3 text-right">Costo Total</th>
                        <th class="p-3 text-right text-blue-300">P. Actual</th>
                        <th class="p-3 text-right font-bold">Venta Neta</th>
                        <th class="p-3 text-right font-black">Ganancia/Pérdida</th>
                        <th class="p-3 text-center"></th>
                    </tr>
                </thead>
                <tbody id="tabla" class="divide-y divide-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clp = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' });

        async function cargar() {
            const res = await fetch('/transacciones/');
            const datos = await res.json();
            const t = document.getElementById('tabla');
            t.innerHTML = '';

            datos.forEach(d => {
                const color = d.ganancia >= 0 ? 'text-green-400' : 'text-red-400';
                t.innerHTML += `
                    <tr class="hover:bg-slate-700/50 transition">
                        <td class="p-3 text-slate-500">${d.fecha}</td>
                        <td class="p-3 font-bold text-blue-400">${d.entidad}</td>
                        <td class="p-3 text-right">${d.acciones.toLocaleString()}</td>
                        <td class="p-3 text-right">$${d.precio_compra}</td>
                        <td class="p-3 text-right font-medium">${clp.format(d.costo_total)}</td>
                        <td class="p-3 text-right text-blue-300">$${d.precio_actual}</td>
                        <td class="p-3 text-right font-bold bg-slate-900/30">${clp.format(d.monto_venta_neta)}</td>
                        <td class="p-3 text-right font-black ${color} text-sm uppercase">
                            ${d.ganancia >= 0 ? '+' : ''}${clp.format(d.ganancia)}
                        </td>
                        <td class="p-3 text-center">
                            <button onclick="borrar(${d.id})" class="text-slate-600 hover:text-red-500">×</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function agregar() {
            const f = document.getElementById('fechaIn').value;
            const e = document.getElementById('entIn').value;
            const a = document.getElementById('accIn').value;
            const p = document.getElementById('preIn').value;

            if(!e || !a || !p) return alert("Faltan datos");

            await fetch('/transacciones/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    fecha: f || null,
                    entidad: e,
                    acciones: parseInt(a),
                    precio_compra: parseFloat(p)
                })
            });
            
            // Limpiar
            document.getElementById('entIn').value = '';
            document.getElementById('accIn').value = '';
            document.getElementById('preIn').value = '';
            cargar();
        }

        async function borrar(id) {
            if(confirm("¿Eliminar?")) {
                await fetch(`/transacciones/${id}`, { method: 'DELETE' });
                cargar();
            }
        }

        cargar();
        setInterval(cargar, 60000); // Actualiza cada minuto
    </script>
</body>
</html>
